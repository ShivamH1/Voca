services:
  - type: web
    name: voca-backend
    runtime: python
    rootDir: apps/backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: FRONTEND_URL
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: COLLECTION_PREFIX
        value: voca
